version: 2
updates:
  # npm — root workspace covers all JS/TS packages
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"

  # Flutter (pub)
  - package-ecosystem: "pub"
    directory: "/packages/flutter"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "flutter"

  # Rails (bundler)
  - package-ecosystem: "bundler"
    directory: "/packages/rails"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "rails"

  # Laravel (composer)
  - package-ecosystem: "composer"
    directory: "/packages/laravel"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "laravel"
